version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    open-pull-requests-limit: 0
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "surrealdb"
      - dependency-name: "ssi-*"
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
